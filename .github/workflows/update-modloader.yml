          commit-message: "chore(deps): bump mc_1_20_1_forge_version from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}"
          title: "chore(deps): bump mc_1_20_1_forge_version from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}"
          body: "Bumps `mc_1_20_1_forge_version` in gradle.properties from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}."
          delete-branch: false

