          title: "chore(deps): bump mc_1_21_1_architectury_api_version from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}"
          body: "Bumps `mc_1_21_1_architectury_api_version` in gradle.properties from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}."
          delete-branch: false

  architectury-1-20-1:
    name: Update Architectury API 1.20.1
    runs-on: ubuntu-latest
    env:
      maven_repo: "https://maven.architectury.dev"
      maven_path: "dev/architectury/architectury-fabric"
      version_prefix: "9."
      prop_key: "mc_1_20_1_architectury_api_version"
      props_file: "gradle.properties"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Parse latest/current Architectury API version
        id: parse
        run: |
          set -euo pipefail
          tmp=/tmp/maven-metadata.xml
          url="$maven_repo/$maven_path/maven-metadata.xml"
          echo "Fetching $url"
          curl -fsSL "$url" -o "$tmp"
          versions=$(awk -F'[<>]' '/<version>/{print $3}' "$tmp" || true)
          PREFIX_REGEX=$(printf '%s' "$version_prefix" | sed 's/\./\\./g')
          latest=$(printf "%s\n" $versions | grep -E "^${PREFIX_REGEX}" | grep -v -E "-(beta|alpha|rc|SNAPSHOT)" | sort -V | tail -n1 || true)
          current=$(grep "^${prop_key}" "$props_file" | sed 's/.*= *//' | tr -d '[:space:]')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

      - name: Update gradle.properties
        if: ${{ steps.parse.outputs.latest != '' && steps.parse.outputs.latest != steps.parse.outputs.current }}
        run: |
          set -euo pipefail
          latest="${{ steps.parse.outputs.latest }}"
          echo "Updating $prop_key -> $latest"
          sed -i "s|^${prop_key} = .*|${prop_key} = ${latest}|" "$props_file"
          git add "$props_file"

      - name: Create branch name
        id: branch_name
        if: ${{ steps.parse.outputs.latest != '' && steps.parse.outputs.latest != steps.parse.outputs.current }}
        run: |
          sanitized_branch=$(printf '%s' "${{ github.ref_name }}" | sed 's/\./-/g')
          branch="github-actions/${sanitized_branch}/update/architectury-1.20.1"
          echo "branch=$branch" >> $GITHUB_OUTPUT

      - name: Prepare git user
        if: ${{ steps.parse.outputs.latest != '' && steps.parse.outputs.latest != steps.parse.outputs.current }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        if: ${{ steps.parse.outputs.latest != '' && steps.parse.outputs.latest != steps.parse.outputs.current }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch_name.outputs.branch }}
          commit-message: "chore(deps): bump mc_1_20_1_architectury_api_version from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}"
          title: "chore(deps): bump mc_1_20_1_architectury_api_version from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}"
          body: "Bumps `mc_1_20_1_architectury_api_version` in gradle.properties from ${{ steps.parse.outputs.current }} to ${{ steps.parse.outputs.latest }}."
          delete-branch: false
