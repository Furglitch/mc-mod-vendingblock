name: Create Mod

on:
  workflow_dispatch:
    inputs:
      mod_display_name:
        description: 'Mod display name (e.g. "My Cool Mod")'
        required: true
        default: 'Example Mod'
      mod_id:
        description: 'Mod ID in snake_case (e.g. my_cool_mod)'
        required: true
        default: 'example_mod'
      mod_class_name:
        description: 'Main class name in PascalCase (e.g. MyCoolMod)'
        required: true
        default: 'ExampleMod'
      maven_group:
        description: 'Maven group ID (e.g. com.yourname)'
        required: true
        default: 'com.example'
      author:
        description: 'Author name'
        required: true
        default: 'Me!'

permissions:
  contents: write

jobs:
  create-mod:
    name: Initialize Mod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Replace placeholders in file contents
        env:
          MOD_DISPLAY_NAME: ${{ inputs.mod_display_name }}
          MOD_ID: ${{ inputs.mod_id }}
          MOD_CLASS_NAME: ${{ inputs.mod_class_name }}
          MAVEN_GROUP: ${{ inputs.maven_group }}
          AUTHOR: ${{ inputs.author }}
        run: |
          NEW_PKG_PATH="${MAVEN_GROUP//.//}"

          find . -type f \
            \( -name "*.java" -o -name "*.json" -o -name "*.toml" \
               -o -name "*.gradle" -o -name "*.properties" -o -name "*.md" \
               -o -name "*.yml" -o -name "*.yaml" -o -name "*.txt" \) \
            ! -path "./.git/*" ! -path "*/build/*" ! -path "*/.gradle/*" \
          | while read -r file; do
              sed -i \
                -e "s|Example Mod|${MOD_DISPLAY_NAME}|g" \
                -e "s|ExampleMod|${MOD_CLASS_NAME}|g" \
                -e "s|example_mod|${MOD_ID}|g" \
                -e "s|com\.example|${MAVEN_GROUP}|g" \
                -e "s|com/example|${NEW_PKG_PATH}|g" \
                -e "s|Me!|${AUTHOR}|g" \
                "$file"
            done

      - name: Rename Java source directories
        env:
          MAVEN_GROUP: ${{ inputs.maven_group }}
        run: |
          NEW_PKG_PATH="${MAVEN_GROUP//.//}"

          for src_dir in \
            "1-21-1/common/src/main/java" \
            "1-21-1/fabric/src/main/java" \
            "1-21-1/neoforge/src/main/java" \
            "1-20-1/common/src/main/java" \
            "1-20-1/fabric/src/main/java" \
            "1-20-1/forge/src/main/java"
          do
            [ -d "$src_dir" ] || continue
            OLD_PKG="$src_dir/com/example"
            NEW_PKG="$src_dir/$NEW_PKG_PATH"

            if [ -d "$OLD_PKG" ] && [ "$OLD_PKG" != "$NEW_PKG" ]; then
              mkdir -p "$(dirname "$NEW_PKG")"
              mv "$OLD_PKG" "$NEW_PKG"
              # Remove now-empty old parent directories
              find "$src_dir/com" -type d -empty -delete 2>/dev/null || true
              rmdir "$src_dir/com" 2>/dev/null || true
            fi
          done

      - name: Rename Java class files
        env:
          MOD_CLASS_NAME: ${{ inputs.mod_class_name }}
        run: |
          find . -type f -name "ExampleMod*.java" \
            ! -path "./.git/*" ! -path "*/build/*" \
          | while read -r f; do
              dir="$(dirname "$f")"
              base="$(basename "$f")"
              new_base="${base//ExampleMod/${MOD_CLASS_NAME}}"
              [ "$base" != "$new_base" ] && mv "$f" "$dir/$new_base"
            done

      - name: Rename mixin JSON files
        env:
          MOD_ID: ${{ inputs.mod_id }}
        run: |
          find . -type f -name "example_mod*.json" \
            ! -path "./.git/*" ! -path "*/build/*" \
          | while read -r f; do
              dir="$(dirname "$f")"
              base="$(basename "$f")"
              new_base="${base//example_mod/${MOD_ID}}"
              [ "$base" != "$new_base" ] && mv "$f" "$dir/$new_base"
            done

      - name: Remove template-only files
        run: |
          rm -f .github/workflows/pages.yml
          rm -f .github/FUNDING.yml
          rm -f .github/workflows/update-modloader.yml
          rm -f .github/workflows/create-mod.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: initialize mod from template"
          git push
