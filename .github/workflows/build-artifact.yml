name: Build Mod

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build.yml'
      - '*/*/src/**'
      - '*/*/build.gradle'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/build.yml'
      - '*/*/src/**'
      - '*/*/build.gradle'
      - 'build.gradle'
      - 'gradle.properties'
      - 'settings.gradle'
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew mergeAll

      - name: Parse mod info
        id: mod_info
        run: |
          VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          ARCHIVES=$(grep '^archives_name' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "archives=$ARCHIVES" >> $GITHUB_OUTPUT

      - name: Collect JARs
        run: |
          mkdir -p artifacts
          find . -path '*/build/merged/*' \
            ! -name '*-dev.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-shadow.jar' \
            -name '*.jar' \
            -exec cp {} artifacts/ \;

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.mod_info.outputs.archives }}-${{ steps.mod_info.outputs.version }}
          path: artifacts/
          compression-level: 0
          if-no-files-found: warn
